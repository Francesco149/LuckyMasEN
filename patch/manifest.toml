"設定" = "Settings"
"ｷｬﾗﾌｫﾙﾀﾞ(&F):" = "Folder(&F):"
"ｷｬﾗ(&D):" = "Char(&D):"
"起動時にgoogleｶﾚﾝﾀﾞｰをﾁｪｯｸ(&C)" = "Check Google Calendar(&C)"
"ﾕｰｻﾞ/ﾊﾟｽﾜｰﾄﾞの設定(&Y)..." = "User/Pass(&Y)..."
"ﾒｰﾙﾁｪｯｸの間隔(&T):" = "Interval(&T):"
"(分)" = "(min)"
"起動時にﾒｰﾙをﾁｪｯｸ(&B)" = "Check mail on boot(&B)"
"ﾒｰﾙｸﾗｲｱﾝﾄ(&E):" = "Client(&E):"
"ﾒｰﾙ設定(&M):" = "Mail(&M):"
"POP3ｻｰﾊﾞ(&H):" = "POP3(&H):"
"ﾎﾟｰﾄ(&N):" = "Port(&N):"
"ﾃﾞﾌｫﾙﾄ" = "Default"
"ｱｶｳﾝﾄ名(&A):" = "Acct(&A):"
"ﾊﾟｽﾜｰﾄﾞ(&P):" = "Pass(&P):"
