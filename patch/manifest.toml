# patch/manifest.toml — the single source of truth for EVERYTHING we patch.
#
# Consumed by tools/build_patch.py, which mirrors the user's own
# originals/installed/ tree into out/patched/ and then applies these ops, emitting
# out/patched/PATCH-LOG.txt (the generated audit). We never ship SYGNAS bytes — only
# this manifest + the engine + the patch/ sources are redistributable.
#
# Paths in `file`/`glob`/`frm`/`to` are relative to the install-tree root
# (originals/installed/ == app/ + sys/). Paths in `src` are relative to the repo root.
# String fields are templated with {install_root_jp} / {install_root_en} below.
# Any op may set `active = false` to record intent without applying (logged DEFERRED).

[meta]
install_root_jp = "らき☆マス"          # JP install dir (under C:\Program Files\SYGNAS\)
install_root_en = "LuckyMas"            # English replacement (used by the installer re-wrap)

# ─────────────────────────────────────────────────────────────────────────────
# Launcher speech — repack each translated cp932 Ini back into its ACZ (.Xvi).
# 22 characters × (Name + 8 Serif lines). Source: tools/build_launcher_en.py.
# ─────────────────────────────────────────────────────────────────────────────
[[xvi]]
glob = "app/launcher/*.Xvi"
src  = "patch/launcher/{stem}.ini"
note = "launcher dialogue — 22 characters (Name + Serif* lines)"

# ─────────────────────────────────────────────────────────────────────────────
# Launcher right-click menu — English item titles. Paths (Exec###) are left
# untouched so a deploy onto the current JP install still launches; the install-
# root path rewrite is deferred below (installer stage pins the dir).
# LOCALE-SAFETY: Launch.exe reads this via GetPrivateProfileStringA (ANSI), so on a
# non-JP-locale box (project goal #2) any non-ASCII byte mojibakes. Keep titles
# PURE ASCII — hence "Lucky Star" not "Lucky☆Star". (Same rule applies to the .Xvi
# serifs, drawn via DrawTextA; a few still carry ☆ → ASCII-pass is a follow-up.)
# ─────────────────────────────────────────────────────────────────────────────
[[text_keys]]
file = "app/launcher/Launch.ini"
encoding = "cp932"
note = "Launch.ini — English menu titles (ASCII-safe)"
keys = { Title000 = "iM@S Calculator", Title001 = "Lucky*Star Calculator", Title002 = "Google Calendar", Title003 = "Copy Animation", Title004 = "Wallpaper Picker", Title009 = "Display Properties" }

# ─────────────────────────────────────────────────────────────────────────────
# Readme — full English translation. Opened only in Notepad (no app code reads it),
# so emit UTF-8 + BOM (utf-8-sig): XP Notepad detects the BOM and renders ☆/×/■/○
# correctly on ANY locale (unlike cp932, which would mojibake on a non-JP box).
# ─────────────────────────────────────────────────────────────────────────────
[[text_file]]
file = "app/お読みください.txt"
src  = "patch/text/readme-en.txt"
encoding = "utf-8-sig"
crlf = true
note = "readme (お読みください.txt) — English translation (UTF-8 BOM)"

# ─────────────────────────────────────────────────────────────────────────────
# Wallpaper picker page — English UI text only. The <h2> section headers are baked
# into JPGs (image edit, deferred) and the artist credits stay in JP; all 96
# <a href>/<img src> refs are preserved verbatim (JPG renames are deferred below).
# ─────────────────────────────────────────────────────────────────────────────
[[text_subst]]
file = "app/wallpaper/壁紙えらび.html"
encoding = "utf-8"
note = "壁紙えらび.html — English picker UI"
subs = [
  { from = "<html lang=\"ja\">", to = "<html lang=\"en\">" },
  { from = "<title>らき☆マス　壁紙えらび</title>", to = "<title>Lucky*Mas — Wallpaper Picker</title>" },
  { from = "<h1>らき☆マス　デスクトップアクセサリ</h1>", to = "<h1>Lucky*Mas Desktop Accessory</h1>" },
  { from = "alt=\"壁紙の設定方法\"", to = "alt=\"How to set your wallpaper\"" },
  { from = "alt=\"壁紙一覧\"", to = "alt=\"Wallpaper list\"" },
  { from = "alt=\"あなたのモニターサイズ\"", to = "alt=\"Your monitor size\"" },
  { from = "<li>壁紙にしたい絵を選びます。</li>", to = "<li>Choose the picture you want as your wallpaper.</li>" },
  { from = "<li>PCのモニターサイズに近い画像サイズをクリックします。</li>", to = "<li>Click the image size closest to your monitor's resolution.</li>" },
  { from = "<li>絵が表示されたらマウスの右クリックメニューから「背景に設定」を選びます。<br>（Firefoxの場合は「デスクトップの背景に設定」）</li>", to = "<li>When the picture opens, right-click it and choose \"Set as Background\".<br>(In Firefox: \"Set As Desktop Background\".)</li>" },
  { from = "<p>お使いのモニターサイズは</p>", to = "<p>Your monitor's resolution is</p>" },
  { from = "</strong>です。", to = "</strong>." },
  { from = "一番上に戻る", to = "Back to top" },
]

# ─────────────────────────────────────────────────────────────────────────────
# Calendar client redirect — point gcalcore.dll off www.google.com to our local
# server WITHOUT a hosts blackhole (so the XP box keeps real Google/internet).
# The host appears as a wide (UTF-16LE) string TWICE: the bare host (used by the
# ClientLogin/feed CHttpConnection) and inside the allcalendars full URL. Both are
# whole NUL-terminated strings replaced in place and NUL-padded (localhost is
# shorter). The event-feed link the server returns is already localhost (gcalsrv.lua),
# and the cert is regenerated CN=localhost (make-xp-cert.sh) so WinINet's TLS name
# check passes. Drop the XP hosts line after applying.
# ─────────────────────────────────────────────────────────────────────────────
[[binpatch]]
file = "app/launcher/gcalcore.dll"
wide = true
note = "gcalcore.dll — calendar host www.google.com -> localhost (no hosts redirect)"
strings = [
  { old = "www.google.com", new = "localhost" },
  { old = "http://www.google.com/calendar/feeds/default/allcalendars/full", new = "http://localhost/calendar/feeds/default/allcalendars/full" },
]

# gcal.exe carries the SAME host/feed strings (host, allcalendars URL) plus the
# browser add-event deep-link. Patch all three so nothing reaches the real Google
# once the hosts redirect is gone. (Launch.exe has only bare "google"/"POP3" labels —
# no connectable host; the POP3 mail host comes from Launch.ini [Mail], deferred.)
[[binpatch]]
file = "app/launcher/gcal.exe"
wide = true
note = "gcal.exe — calendar host/feed + add-event deep-link -> localhost"
strings = [
  { old = "www.google.com", new = "localhost" },
  { old = "http://www.google.com/calendar/feeds/default/allcalendars/full", new = "http://localhost/calendar/feeds/default/allcalendars/full" },
  { old = "http://www.google.com/calendar/event?action=TEMPLATE&dates=%4d%02d%02d/%4d%02d%02d", new = "http://localhost/calendar/event?action=TEMPLATE&dates=%4d%02d%02d/%4d%02d%02d" },
]

# ═════════════════════════════════════════════════════════════════════════════
# HARDCODED runtime strings (NOT PE resources). Found with tools/scan_jp.py — these
# are string literals compiled into the binaries, drawn at runtime by AppendMenu /
# TextOut / MessageBox / SHBrowseForFolder, so pe_res.py can't see them.
#
# encoding="cp932": JP drawn via the ANSI (*A) APIs is Shift-JIS → it MOJIBAKES on a
# non-JP locale (project goal #2), so ASCII-izing is locale-CRITICAL. `old` is matched
# as cp932; `new` (ASCII) is shorter → fits + NUL-pads. EN char ≈ 1 byte vs 2 for a JP
# char, so budgets are roomy. A few are kept tight (the byte budget is noted inline).
# ═════════════════════════════════════════════════════════════════════════════

# MinkIt.exe — the copy-animation engine front-end. It has NO RT_MENU: the tray menu is
# AppendMenuA'd from these literals; the Setup "Event type" combo is filled from the 5
# file-event labels; (無題)/(不明) are the Preview Title/Author FALLBACK defaults — shown only
# when a .mink's `info` chunk lacks that field. The `info` chunk IS per-character metadata
# (Title=/Author=/…, its own LZSS — cracked, see mink-format.md); the real Title is rewritten to
# ASCII by the [[mink_info]] op below, so the Preview/Settings list show "Konata" etc., not the
# fallback. "設定(&S)..."(11B) can't fit "Settings(&S)..." → "Options(&S)" keeps the mnemonic+style.
[[binpatch]]
file = "app/copy/MinkIt.exe"
encoding = "cp932"
note = "MinkIt.exe — tray menu + event-type combo + Preview defaults + messages (hardcoded SJIS)"
strings = [
  { old = "終了(&X)", new = "Exit(&X)" },                                  # tray menu (8B)
  { old = "設定(&S)...", new = "Options(&S)" },                           # tray menu (11B)
  { old = "ごみ箱に捨てる", new = "To Recycle Bin" },                       # event type (14B)
  { old = "ごみ箱を空", new = "Empty Bin" },                               # event type (10B)
  { old = "Internetからのﾀﾞｳﾝﾛｰﾄﾞ", new = "Download from Internet" },      # event type (22B)
  { old = "ﾌｧｲﾙの削除", new = "Delete" },                                  # event type (10B)
  { old = "ﾌｧｲﾙｺﾋﾟｰ・移動", new = "Copy/Move file" },                      # event type (14B)
  { old = "(なし)", new = "(none)" },                                      # default (6B)
  { old = "(不明)", new = "(unk.)" },                                      # Author default (6B)
  { old = "(無題)", new = "(none)" },                                      # Title default (6B)
  { old = "%sのﾌﾟﾚﾋﾞｭｰ", new = "%s Preview" },                            # preview window title (11B)
  { old = "ｱﾆﾒｰｼｮﾝﾌｧｲﾙのﾌｫﾙﾀﾞ", new = "Animation folder" },              # folder-picker (18B)
  { old = "ｽﾀｰﾄｱｯﾌﾟにｼｮｰﾄｶｯﾄを作成します。", new = "Creates a shortcut in Startup." },
  { old = "アニメーションが終わっていません。強制終了しますか?", new = "The animation hasn't finished. Force quit?" },
]

# MinkIt.dll — the engine. One init-failure message.
[[binpatch]]
file = "app/copy/MinkIt.dll"
encoding = "cp932"
note = "MinkIt.dll — init-failure message (hardcoded SJIS)"
strings = [
  { old = "初期化に失敗しました", new = "Failed to initialize" },           # (20B)
]

# .mink `info` chunks — per-character Title= (the MinkIt Settings list + Preview "Title:" text).
# Decoded via the cracked info-chunk LZSS (mink-format.md), retitled to ASCII, re-compressed.
# Runs on the JP filenames (content op precedes the .mink rename in OP_ORDER); matches by content,
# so it covers each character's _copy + _dl pair. Author=SYGNAS / RefURL / Pattern / Interval are
# already ASCII → untouched. Cross-over cast: Lucky☆Star (Konata/Kagami) × iDOLM@STER (Chihaya/Makoto/Yayoi).
[[mink_info]]
glob = "app/copy/*.mink"
encoding = "cp932"
note = "MinkIt .mink Title= -> ASCII (per-character info-chunk metadata)"
subs = [
  { old = "Title=こなた", new = "Title=Konata" },
  { old = "Title=かがみ", new = "Title=Kagami" },
  { old = "Title=千早",   new = "Title=Chihaya" },
  { old = "Title=真",     new = "Title=Makoto" },
  { old = "Title=やよい", new = "Title=Yayoi" },
]

