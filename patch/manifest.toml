# ─────────────────────────────────────────────────────────────────────────────
# WIDE (UTF-16) hardcoded JP in the MFC-Unicode calendar binaries. These render fine
# as Unicode on any locale (no mojibake) — so this is English-completeness, not a
# locale fix. ⚠️ Both sides are 2 bytes/char, so the budget is in CHARACTERS and EN is
# usually longer than JP: only strings whose JP char-count is inflated by embedded
# ASCII (%d / "Result Code") leave room. The two pure-status strings only fit a generic
# "Loading...". MFC AppWizard boilerplate + the dialog/version TODO placeholders +
# the MS-Gothic font names are left as-is (not user-facing / risky) — see notes below.
# ─────────────────────────────────────────────────────────────────────────────
[[binpatch]]
file = "app/launcher/gcal.exe"
wide = true
note = "gcal.exe — calendar status/error/prompt strings (wide)"
strings = [
  { old = "カレンダーを取得しています", new = "Loading..." },                 # fetch status (13 ch)
  { old = "予定を取得しています", new = "Loading..." },                       # fetch status (10 ch)
  { old = "他 %d 件", new = " +%d" },                                       # "+N more" count (6 ch)
  { old = "表示するカレンダーを選択してください", new = "Select a calendar." }, # prompt (18 ch)
  { old = "gcalcore.dll のパス情報が取得できませんでした。", new = "Can't get gcalcore.dll path." },
  { old = "認証エラーが発生しました。\n\nResult Code : %d\n", new = "Auth error.\n\nResult Code : %d\n" },
  { old = "例外が発生しました。\nエラー: %d\n%s\n", new = "Exception\nError %d\n%s\n" },
  { old = "通信エラーが発生しました。\n\nResult Code : %d\n%s", new = "Network error\n\nResult Code : %d\n%s" },
  { old = "Windows ソケットの初期化に失敗しました。", new = "Winsock init failed." },
]

[[binpatch]]
file = "app/launcher/gcalcore.dll"
wide = true
note = "gcalcore.dll — error strings (wide)"
strings = [
  { old = "gcalcore.dll のパス情報が取得できませんでした。", new = "Can't get gcalcore.dll path." },
  { old = "例外が発生しました。\nエラー: %d\n%s\n", new = "Exception\nError %d\n%s\n" },
